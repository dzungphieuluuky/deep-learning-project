# @package _global_
optimizer:
  _target_: torch.optim.AdamW
  lr: 3e-4
  weight_decay: 0.01
  betas: [0.9, 0.999]
  eps: 1e-8

scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  T_max: ${training.max_epochs}
  eta_min: 1e-6

loss:
  _target_: torch.nn.CrossEntropyLoss
  label_smoothing: 0.1
